id: tf-fix-state
title: Reconcile Drifting Infrastructure
xp: 30
estimated_minutes: 8
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-state-challenge
  - mkdir -p $HOME/terraform-state-challenge
  - echo 'resource "local_file" "recovery" { content = "expected_state" \n filename
    = "/tmp/recovery.txt" }' > $HOME/terraform-state-challenge/main.tf
  - cd $HOME/terraform-state-challenge && terraform init && terraform apply -auto-approve
  - rm -f /tmp/recovery.txt
version: 1
