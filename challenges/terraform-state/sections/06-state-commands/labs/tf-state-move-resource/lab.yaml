id: tf-state-move-resource
title: Rename Resource using State Move
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-state-challenge
  - mkdir -p $HOME/terraform-state-challenge
  - echo 'resource "local_file" "old_name" { content = "data" \n filename = "/tmp/mv.txt"
    }' > $HOME/terraform-state-challenge/main.tf
  - cd $HOME/terraform-state-challenge && terraform init && terraform apply -auto-approve
  - echo 'resource "local_file" "new_name" { content = "data" \n filename = "/tmp/mv.txt"
    }' > $HOME/terraform-state-challenge/main.tf
version: 1
