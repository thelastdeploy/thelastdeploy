id: k8s-create-clusterip-service
title: "Create a ClusterIP Service"
xp: 25
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-services-networking"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-create-clusterip-service &>/dev/null; do sleep 1; done'
    - 'kubectl create deployment backend-app --image=nginx --replicas=2 --context=kind-tld-k8s-create-clusterip-service'
version: 1
