id: k8s-access-service
title: "Access a Service Internal to Cluster"
xp: 30
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-services-networking"
    - "rm -f $HOME/k8s-services-networking/backend-response.html"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-access-service &>/dev/null; do sleep 1; done'
    - 'kubectl create deployment backend-app --image=nginx --replicas=1 --context=kind-tld-k8s-access-service'
    - 'kubectl expose deployment backend-app --name=backend-service --port=80 --target-port=80 --context=kind-tld-k8s-access-service'
    - 'kubectl run client-pod --image=curlimages/curl --context=kind-tld-k8s-access-service --command -- sleep 3600'
version: 1
