id: k8s-service-dns
title: "Resolve Service DNS"
xp: 30
estimated_minutes: 5
setup:
  type: kind
  resource_limits_cpu: 1
  resource_limits_mem: 1024
  seed_commands:
    - "mkdir -p $HOME/k8s-services-networking"
    - "rm -f $HOME/k8s-services-networking/dns-resolve.txt"
    - 'until kubectl get serviceaccount default --context=kind-tld-k8s-service-dns &>/dev/null; do sleep 1; done'
    - 'kubectl create deployment backend-app --image=nginx --replicas=1 --context=kind-tld-k8s-service-dns'
    - 'kubectl expose deployment backend-app --name=backend-service --port=80 --target-port=80 --context=kind-tld-k8s-service-dns'
    - 'kubectl run client-pod --image=busybox --context=kind-tld-k8s-service-dns --command -- sleep 3600'
version: 1
