id: dkr-fix-env-configuration
title: "Use .env file for configuration"
xp: 45
estimated_minutes: 10
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/docker-compose/env-vars"
    - |
      cat << 'EOF' > $HOME/docker-compose/env-vars/docker-compose.yml
      version: "3.8"
      services:
        app:
          image: alpine
          command: sh -c "echo App password is \$\$DB_PASSWORD && sleep 3600"
          environment:
            - DB_PASSWORD=${DB_PASSWORD}
        db:
          image: postgres:15-alpine
          environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=app_db
      EOF
    - "rm -f $HOME/docker-compose/env-vars/.env"
    - "docker compose -f $HOME/docker-compose/env-vars/docker-compose.yml down -v || true"
version: 1
