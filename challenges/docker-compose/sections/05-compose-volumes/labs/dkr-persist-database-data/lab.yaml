id: dkr-persist-database-data
title: "Persist database data with named volumes"
xp: 40
estimated_minutes: 10
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/docker-compose/volumes"
    - "rm -f $HOME/docker-compose/volumes/docker-compose.yml"
    - "docker compose -f $HOME/docker-compose/volumes/docker-compose.yml down -v || true"
version: 1
