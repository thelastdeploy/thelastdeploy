id: dkr-launch-compose-stack
title: "Launch a Compose stack"
xp: 30
estimated_minutes: 5
order: 2
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/docker-compose/first-compose"
    - |
      cat << 'EOF' > $HOME/docker-compose/first-compose/docker-compose.yml
      version: "3.8"
      services:
        web:
          image: nginx:alpine
          ports:
            - "8080:80"
      EOF
    - "docker compose -f $HOME/docker-compose/first-compose/docker-compose.yml down -v || true"
version: 1
