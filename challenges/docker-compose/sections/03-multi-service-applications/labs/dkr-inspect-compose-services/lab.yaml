id: dkr-inspect-compose-services
title: "Inspect and scale Compose services"
xp: 30
estimated_minutes: 5
order: 2
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/docker-compose/multi-service"
    - |
      cat << 'EOF' > $HOME/docker-compose/multi-service/docker-compose.yml
      version: "3.8"
      services:
        web:
          image: nginx:alpine
          ports:
            - "80"
        db:
          image: postgres:15-alpine
          environment:
            - POSTGRES_PASSWORD=secret
      EOF
    - "docker compose -f $HOME/docker-compose/multi-service/docker-compose.yml down -v || true"
    - "docker compose -f $HOME/docker-compose/multi-service/docker-compose.yml up -d"
version: 1
