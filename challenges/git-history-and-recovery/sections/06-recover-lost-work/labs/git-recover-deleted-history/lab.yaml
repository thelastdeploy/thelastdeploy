id: git-recover-deleted-history
title: "Recover Deleted History"
xp: 30
estimated_minutes: 10
setup:
  type: shell
  seed_commands:
    - "rm -rf $HOME/git-challenge"
    - "mkdir -p $HOME/git-challenge"
    - "git -C $HOME/git-challenge init"
    - "git -C $HOME/git-challenge config user.name 'Developer'"
    - "git -C $HOME/git-challenge config user.email 'dev@example.com'"
    - "echo 'hello' > $HOME/git-challenge/file.txt"
    - "git -C $HOME/git-challenge add file.txt"
    - "git -C $HOME/git-challenge commit -m 'Initial commit'"
    - "git -C $HOME/git-challenge checkout -b experimental"
    - "echo 'experimental ideas' > $HOME/git-challenge/experiment.txt"
    - "git -C $HOME/git-challenge add experiment.txt"
    - "git -C $HOME/git-challenge commit -m 'Add experiment file'"
    - "git -C $HOME/git-challenge rev-parse HEAD > $HOME/git-challenge/.correct-hash"
    - "git -C $HOME/git-challenge checkout master || git -C $HOME/git-challenge checkout main"
    - "git -C $HOME/git-challenge branch -D experimental"
version: 1
