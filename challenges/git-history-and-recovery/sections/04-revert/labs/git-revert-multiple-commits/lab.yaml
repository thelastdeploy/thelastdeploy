id: git-revert-multiple-commits
title: "Revert Multiple Commits"
xp: 25
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "rm -rf $HOME/git-challenge"
    - "mkdir -p $HOME/git-challenge"
    - "git -C $HOME/git-challenge init"
    - "git -C $HOME/git-challenge config user.name 'Developer'"
    - "git -C $HOME/git-challenge config user.email 'dev@example.com'"
    - "echo '1' > $HOME/git-challenge/one.txt"
    - "git -C $HOME/git-challenge add one.txt"
    - "git -C $HOME/git-challenge commit -m 'Initial commit'"
    - "echo '2' > $HOME/git-challenge/two.txt"
    - "git -C $HOME/git-challenge add two.txt"
    - "git -C $HOME/git-challenge commit -m 'Second commit'"
    - "echo '3' > $HOME/git-challenge/three.txt"
    - "git -C $HOME/git-challenge add three.txt"
    - "git -C $HOME/git-challenge commit -m 'Third commit'"
    - "echo '4' > $HOME/git-challenge/four.txt"
    - "git -C $HOME/git-challenge add four.txt"
    - "git -C $HOME/git-challenge commit -m 'Fourth commit'"
version: 1
