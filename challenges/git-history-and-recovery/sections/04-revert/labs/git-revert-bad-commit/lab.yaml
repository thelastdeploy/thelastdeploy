id: git-revert-bad-commit
title: "Revert a Bad Commit"
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "rm -rf $HOME/git-challenge"
    - "mkdir -p $HOME/git-challenge"
    - "git -C $HOME/git-challenge init"
    - "git -C $HOME/git-challenge config user.name 'Developer'"
    - "git -C $HOME/git-challenge config user.email 'dev@example.com'"
    - "echo 'port=8080' > $HOME/git-challenge/app.config"
    - "git -C $HOME/git-challenge add app.config"
    - "git -C $HOME/git-challenge commit -m 'Initial commit'"
    - "echo 'api_key=SECRET_XYZ' >> $HOME/git-challenge/app.config"
    - "git -C $HOME/git-challenge add app.config"
    - "git -C $HOME/git-challenge commit -m 'Add API key config'"
    - "echo 'db_logging=true' >> $HOME/git-challenge/app.config"
    - "git -C $HOME/git-challenge add app.config"
    - "git -C $HOME/git-challenge commit -m 'Add database logging config'"
version: 1
