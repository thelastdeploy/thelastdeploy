id: tf-validate-project
title: Validate a Terraform Project
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-hcl-challenge
  - mkdir -p $HOME/terraform-hcl-challenge
  - echo 'provider "local" {}' > $HOME/terraform-hcl-challenge/main.tf
  - "echo 'resource \"local_file\" \"validated\" { content = \"Valid HCL\" \n filename\
    \ = \"/tmp/valid.txt\" }' >> $HOME/terraform-hcl-challenge/main.tf"
version: 1
