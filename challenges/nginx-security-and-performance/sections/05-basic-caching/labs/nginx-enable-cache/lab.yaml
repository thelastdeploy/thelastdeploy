id: nginx-enable-cache
title: "Configure Proxy Caching"
xp: 25
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "sudo cp /etc/nginx/nginx.conf /etc/nginx/nginx.conf.bak || true"
    - "sudo cp /etc/nginx/sites-available/default /etc/nginx/sites-available/default.bak || true"
    # Ensure /app location block exists in default
    - "sudo sed -i '/location \\/app/,+3d' /etc/nginx/sites-available/default || true"
    - "sudo sed -i '$ d' /etc/nginx/sites-available/default"
    - "echo -e '    location /app {\n        proxy_pass http://127.0.0.1:8080;\n    }\n}' | sudo tee -a /etc/nginx/sites-available/default > /dev/null"
    - "sudo mkdir -p /var/cache/nginx"
    - "sudo chown -R www-data:www-data /var/cache/nginx"
    - "sudo systemctl start nginx || true"
    - "sudo systemctl reload nginx || true"
version: 1
