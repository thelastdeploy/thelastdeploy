id: dkr-investigate-production-incident
title: "Investigate a production incident"
xp: 60
estimated_minutes: 15
order: 1
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/docker-troubleshooting/incident"
    - |
      cat << 'EOF' > $HOME/docker-troubleshooting/incident/docker-compose.yml
      version: "3.8"
      services:
        app:
          image: alpine
          command: sh -c "if [ ! -f /etc/app/config.json ]; then echo 'FATAL: config.json not found at /etc/app/config.json' >&2 && exit 1; else echo 'App running...' && sleep 3600; fi"
      EOF
    - "rm -f $HOME/docker-troubleshooting/incident/config.json"
    - "docker compose -f $HOME/docker-troubleshooting/incident/docker-compose.yml down -v || true"
version: 1
