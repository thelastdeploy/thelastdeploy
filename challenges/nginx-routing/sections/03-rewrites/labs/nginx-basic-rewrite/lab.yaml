id: nginx-basic-rewrite
title: "Configure Basic Rewrite"
xp: 25
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "sudo cp /etc/nginx/sites-available/default /etc/nginx/sites-available/default.bak || true"
    - "sudo mkdir -p /var/www/html/newpath"
    - "echo 'new content' | sudo tee /var/www/html/newpath/file.html > /dev/null"
    - "sudo systemctl start nginx || true"
version: 1
