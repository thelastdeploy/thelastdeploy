id: tf-use-tfvars
title: Use a terraform.tfvars File
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-expr-challenge
  - mkdir -p $HOME/terraform-expr-challenge
  - echo 'variable "filename" { type = string }' > $HOME/terraform-expr-challenge/main.tf
  - echo 'resource "local_file" "out" { content = "hello" \n filename = var.filename
    }' >> $HOME/terraform-expr-challenge/main.tf
version: 1
