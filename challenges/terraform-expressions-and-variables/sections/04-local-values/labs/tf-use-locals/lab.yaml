id: tf-use-locals
title: Use Local Values for DRY Code
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-expr-challenge
  - mkdir -p $HOME/terraform-expr-challenge
  - echo 'resource "local_file" "f1" { content = "production" \n filename = "/tmp/prod_1.txt"
    }' > $HOME/terraform-expr-challenge/main.tf
version: 1
