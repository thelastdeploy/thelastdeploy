id: tf-recover-state
title: Recover from Corrupt or Missing State
xp: 25
estimated_minutes: 6
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-troubleshoot-challenge
  - mkdir -p $HOME/terraform-troubleshoot-challenge
  - echo 'resource "local_file" "app" { content = "data" \n filename = "/tmp/state_rec.txt"
    }' > $HOME/terraform-troubleshoot-challenge/main.tf
  - echo 'data' > /tmp/state_rec.txt
  - cd $HOME/terraform-troubleshoot-challenge && terraform init
version: 1
