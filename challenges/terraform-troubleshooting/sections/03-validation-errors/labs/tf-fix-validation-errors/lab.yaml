id: tf-fix-validation-errors
title: Fix Validation Errors
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-troubleshoot-challenge
  - mkdir -p $HOME/terraform-troubleshoot-challenge
  - echo 'provider "local" {}' > $HOME/terraform-troubleshoot-challenge/main.tf
  - echo 'resource "local_file" "val_bug" {\n  invalid_param = "test"\n  filename
    = "/tmp/val.txt"\n}' >> $HOME/terraform-troubleshoot-challenge/main.tf
  - cd $HOME/terraform-troubleshoot-challenge && terraform init
version: 1
