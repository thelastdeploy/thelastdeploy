id: nginx-fix-500
title: "Fix a 500 Internal Server Error"
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "sudo cp /etc/nginx/sites-available/default /etc/nginx/sites-available/default.bak || true"
    # Inject a rewrite loop under a location /loop block
    - "sudo sed -i '/location \\/loop/,+4d' /etc/nginx/sites-available/default || true"
    - "sudo sed -i '$ d' /etc/nginx/sites-available/default"
    - "echo -e '    location /loop {\n        rewrite ^/loop$ /loop1;\n        rewrite ^/loop1$ /loop;\n    }\n}' | sudo tee -a /etc/nginx/sites-available/default > /dev/null"
    - "sudo systemctl start nginx || true"
    - "sudo systemctl reload nginx || true"
version: 1
