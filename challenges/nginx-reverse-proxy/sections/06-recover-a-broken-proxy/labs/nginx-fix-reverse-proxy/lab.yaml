id: nginx-fix-reverse-proxy
title: "Fix Broken Reverse Proxy"
xp: 40
estimated_minutes: 10
setup:
  type: shell
  seed_commands:
    - "sudo cp /etc/nginx/sites-available/default /etc/nginx/sites-available/default.bak || true"
    # Append broken location rule to the default site config
    - "sudo sed -i '/location \\/api/,+3d' /etc/nginx/sites-available/default || true"
    - "sudo sed -i '$ d' /etc/nginx/sites-available/default"
    # Write broken proxy_pass target endpoint (no http:// prefix)
    - "echo -e '    location /api {\n        proxy_pass 127.0.0.1:8080;\n    }\n}' | sudo tee -a /etc/nginx/sites-available/default > /dev/null"
    - "sudo systemctl stop nginx || true"
version: 1
