id: lnx-find-service-error
title: "Retrieve a secret logged by a service"
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/logs-test"
    - "rm -f $HOME/logs-test/secret_key.txt"
    - "mkdir -p $HOME/.config/systemd/user"
    - "echo '[Unit]' > $HOME/.config/systemd/user/devlab-logger.service"
    - "echo 'Description=DevLab Logger Service' >> $HOME/.config/systemd/user/devlab-logger.service"
    - "echo '[Service]' >> $HOME/.config/systemd/user/devlab-logger.service"
    - "echo 'Type=oneshot' >> $HOME/.config/systemd/user/devlab-logger.service"
    - "echo 'ExecStart=/bin/bash -c \"echo SECRET_LOG_KEY=SEC_PROC_99\"' >> $HOME/.config/systemd/user/devlab-logger.service"
    - "systemctl --user daemon-reload"
    - "systemctl --user start devlab-logger.service || true"
version: 1
