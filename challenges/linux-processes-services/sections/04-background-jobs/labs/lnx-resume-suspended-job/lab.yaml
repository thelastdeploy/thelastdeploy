id: lnx-resume-suspended-job
title: "Resume a suspended process"
xp: 25
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "pkill -f suspended_jo[b] || true"
    - "nohup bash -c 'exec -a suspended_job sleep 3600' >/dev/null 2>&1 &"
    - "sleep 0.5"
    - "pkill -STOP -f suspended_jo[b]"
version: 1
