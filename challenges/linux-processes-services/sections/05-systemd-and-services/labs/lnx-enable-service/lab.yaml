id: lnx-enable-service
title: "Enable a user-level service"
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/.config/systemd/user"
    - "echo '[Unit]' > $HOME/.config/systemd/user/devlab-user.service"
    - "echo 'Description=DevLab User Service' >> $HOME/.config/systemd/user/devlab-user.service"
    - "echo '[Service]' >> $HOME/.config/systemd/user/devlab-user.service"
    - "echo 'ExecStart=/bin/sleep 3600' >> $HOME/.config/systemd/user/devlab-user.service"
    - "echo '[Install]' >> $HOME/.config/systemd/user/devlab-user.service"
    - "echo 'WantedBy=default.target' >> $HOME/.config/systemd/user/devlab-user.service"
    - "systemctl --user daemon-reload"
    - "systemctl --user disable devlab-user.service || true"
version: 1
