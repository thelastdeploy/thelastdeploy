id: lnx-find-open-port
title: "Locate an active local listener"
xp: 20
estimated_minutes: 5

setup:
  type: shell
  seed_commands:
    - "mkdir -p $HOME/network-test"
    - "rm -f $HOME/network-test/open_port.txt"
    - "nohup python3 -m http.server 9876 --bind 127.0.0.1 >/dev/null 2>&1 &"
version: 1
