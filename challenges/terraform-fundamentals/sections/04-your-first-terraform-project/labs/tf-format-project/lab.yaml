id: tf-format-project
title: Format Your Terraform Configurations
xp: 15
estimated_minutes: 3
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-challenge
  - mkdir -p $HOME/terraform-challenge
  - echo 'provider   "local"   {}' > $HOME/terraform-challenge/main.tf
  - echo 'resource "local_file" "example" {content = "hello" filename = "out.txt"}'
    >> $HOME/terraform-challenge/main.tf
version: 1
