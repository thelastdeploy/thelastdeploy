id: tf-call-module
title: Call a Child Module from Root
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-modules-challenge
  - mkdir -p $HOME/terraform-modules-challenge/modules/file_writer
  - echo 'resource "local_file" "mod" { content = "module text" \n filename = "/tmp/module_out.txt"
    }' > $HOME/terraform-modules-challenge/modules/file_writer/main.tf
  - touch $HOME/terraform-modules-challenge/main.tf
version: 1
