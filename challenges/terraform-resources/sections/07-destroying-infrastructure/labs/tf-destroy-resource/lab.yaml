id: tf-destroy-resource
title: Destroy Provisioned Resource
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
  - rm -rf $HOME/terraform-resources-challenge
  - mkdir -p $HOME/terraform-resources-challenge
  - "echo 'resource \"local_file\" \"temp\" { content = \"delete me\" \n filename\
    \ = \"/tmp/temp.txt\" }' > $HOME/terraform-resources-challenge/main.tf"
  - cd $HOME/terraform-resources-challenge && terraform init && terraform apply -auto-approve
version: 1
