id: git-delete-merged-branch
title: "Delete a Merged Branch"
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "rm -rf $HOME/git-challenge"
    - "mkdir -p $HOME/git-challenge"
    - "git -C $HOME/git-challenge init"
    - "git -C $HOME/git-challenge config user.name 'Developer'"
    - "git -C $HOME/git-challenge config user.email 'dev@example.com'"
    - "echo 'initial' > $HOME/git-challenge/file.txt"
    - "git -C $HOME/git-challenge add file.txt"
    - "git -C $HOME/git-challenge commit -m 'Initial commit'"
    - "git -C $HOME/git-challenge checkout -b feature-old"
    - "echo 'old' >> $HOME/git-challenge/file.txt"
    - "git -C $HOME/git-challenge commit -am 'Old changes'"
    - "git -C $HOME/git-challenge checkout -b feature-active"
    - "echo 'active' >> $HOME/git-challenge/file.txt"
    - "git -C $HOME/git-challenge commit -am 'Active changes'"
    - "git -C $HOME/git-challenge checkout main"
    - "git -C $HOME/git-challenge merge feature-old"
version: 1
