id: git-merge-feature
title: "Merge a Feature Branch"
xp: 20
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "rm -rf $HOME/git-challenge"
    - "mkdir -p $HOME/git-challenge"
    - "git -C $HOME/git-challenge init"
    - "git -C $HOME/git-challenge config user.name 'Developer'"
    - "git -C $HOME/git-challenge config user.email 'dev@example.com'"
    - "echo 'initial' > $HOME/git-challenge/file.txt"
    - "git -C $HOME/git-challenge add file.txt"
    - "git -C $HOME/git-challenge commit -m 'Initial commit'"
    - "git -C $HOME/git-challenge checkout -b feature-abc"
    - "echo 'feature changes' > $HOME/git-challenge/feature.txt"
    - "git -C $HOME/git-challenge add feature.txt"
    - "git -C $HOME/git-challenge commit -m 'Add feature'"
    - "git -C $HOME/git-challenge checkout main"
    - "echo 'main changes' > $HOME/git-challenge/main.txt"
    - "git -C $HOME/git-challenge add main.txt"
    - "git -C $HOME/git-challenge commit -m 'Update main'"
version: 1
