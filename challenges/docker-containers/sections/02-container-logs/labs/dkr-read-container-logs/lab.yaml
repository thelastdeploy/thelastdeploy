id: dkr-read-container-logs
title: "Read container logs"
xp: 30
estimated_minutes: 5
setup:
  type: shell
  seed_commands:
    - "docker rm -f logger-app || true"
    - "docker run --name logger-app alpine sh -c 'echo \"SECRET_FLAG=docker_logging_master\"'"
    - "mkdir -p $HOME/docker-test"
    - "rm -f $HOME/docker-test/container_flag.txt"
version: 1
